<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login info</title>
</head>
<body><h2>Please give us the following information to purchase</h2>
    <form> 
        <p>Your Name: <input type="text" placeholder="Enter your name"></p><br>
        <p>Your Email: <input type="email" placeholder="Enter your email"></p><br>
        <p>Your Phone Number: <input type="number" placeholder="Enter your phone number"></p><br>
        <p>Your Address: <input type="text" placeholder="Enter your address"></p><br>
        <label for="Tell us your demand">Tell us your demand:</label><br>
        <textarea id="demand" name="demand" rows="4" cols="50" placeholder="Give us your demand"></textarea><br>
        <button type="submit">Submit</button>
        <h2>Cash on Delivery</h2><br>
        <h2>Thank you for your order. We will contact you soon.</h2>
    </form>
        
     
    
</body>
</html>
